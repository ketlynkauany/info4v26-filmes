<div class="container">

  <h1>Calculadora de Média</h1>

  <label>Nota 1</label>
  <input type="number" [(ngModel)]="nota1">

  <label>Nota 2</label>
  <input type="number" [(ngModel)]="nota2">

  <label>Nota Avaliação Final</label>
  <input type="number" [(ngModel)]="notaAvFinal">

  <button (click)="calcularMedia()">
    Calcular
  </button>

  <div class="resultado">
    <h2>Média Parcial: {{ mediaParcial }}</h2>
    <h2>Média Final: {{ mediaFinal }}</h2>
    <h2>Situação: {{ situacao }}</h2>
  </div>

</div>
